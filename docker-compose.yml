# Local development services (spec 11 Postgres + spec 21/25 MinIO object store).
# `pnpm db:up` starts them, `pnpm db:down` stops them. The credentials below must
# match DATABASE_URL and the S3_* block in your .env (see .env.example).
services:
  postgres:
    image: postgres:16
    container_name: saas_boilerplate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_boilerplate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saas_boilerplate"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local S3-compatible object storage (spec 21.1 / 25.1). The storage adapter
  # points at this instead of AWS S3 in dev — no code change, only S3_* env
  # (that is the whole point of hiding storage behind an adapter, §1.2).
  minio:
    image: minio/minio:latest
    container_name: saas_boilerplate_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: create the bucket and make ONLY the `public/` prefix anonymously
  # readable (spec 21.3 — public files by stable URL, private files never). Exits
  # after running; re-running is idempotent.
  minio_init:
    image: minio/mc:latest
    container_name: saas_boilerplate_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/saas-boilerplate &&
      mc anonymous set download local/saas-boilerplate/public &&
      echo 'minio bucket ready'
      "

volumes:
  postgres_data:
  minio_data:
