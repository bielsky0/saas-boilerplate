name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, unit tests & build
    runs-on: ubuntu-latest
    env:
      # The build imports the env schema (fail-fast validation), so provide
      # dummy secrets. No real database or auth is needed to lint/typecheck/build.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci
      BETTER_AUTH_SECRET: ci-dummy-secret-not-used-at-runtime
      # Selecting stripe here makes the build a real check that the billing
      # adapter factory constructs. Signature verification is a local HMAC, so
      # these dummies never reach Stripe.
      BILLING_PROVIDER: stripe
      STRIPE_SECRET_KEY: sk_test_ciDummyKeyNotUsedAtRuntime
      STRIPE_WEBHOOK_SECRET: whsec_ciDummySigningSecretNotReal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Vitest, not Playwright: these cover pure logic (timezone expansion for
      # session generation) with no database and no build, so they belong in the
      # fast job. The e2e job below owns everything that touches Postgres.
      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    name: E2E (Playwright, tenancy=${{ matrix.tenancy }})
    runs-on: ubuntu-latest
    strategy:
      # Never cancel the sibling leg: if `disabled` breaks, the `required` result
      # is exactly what tells you whether the regression is mode-specific or not.
      fail-fast: false
      matrix:
        # Spec 1.4 — prove the flag is cosmetic by booting the app both ways over
        # the same schema. The `disabled` leg skips the 13 org-driving specs; see
        # e2e/tenancy-fixtures.ts for why "all specs in both modes" is not the
        # criterion. `optional` is deliberately not a third leg: its behaviour is
        # a strict subset (orgsEnabled like required, orgsExposed like disabled),
        # so both booleans are covered — just never in that combination.
        tenancy: [required, disabled]
    env:
      # Real Postgres service below; log email adapter so the verification link
      # is captured in-process and read via /api/dev/emails (no SMTP).
      #
      # Two roles, mirroring docker-compose.yml (langlion Faza 0, decyzja D2): the
      # app runs as the unprivileged `saas_school`, so RLS policies actually apply
      # to it, while migrations run as the owner `postgres`. Provisioned by the
      # step below, because a `services:` container cannot run init SQL.
      DATABASE_URL: postgresql://saas_school:saas_school@localhost:5432/e2e
      DATABASE_MIGRATION_URL: postgresql://postgres:postgres@localhost:5432/e2e
      BETTER_AUTH_SECRET: ci-e2e-secret-not-a-real-secret
      EMAIL_PROVIDER: log
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      MULTI_TENANCY_MODE: ${{ matrix.tenancy }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      # The postgres `services:` container has no way to mount
      # docker-entrypoint-initdb.d, so the role docker-compose.yml creates on a
      # fresh volume is created here by hand instead. Must precede db:migrate: the
      # RLS migration GRANTs to this role and aborts if it is missing.
      - name: Provision unprivileged application role (RLS)
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d e2e -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE saas_school LOGIN PASSWORD 'saas_school' NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE;
          GRANT CONNECT ON DATABASE e2e TO saas_school;
          CREATE EXTENSION IF NOT EXISTS btree_gist;
          SQL

      - name: Apply database migrations
        run: pnpm db:migrate

      # MinIO can't be a GitHub `services:` container — the minio/minio image
      # needs a `server /data` command that service containers can't set. Start it
      # by hand instead, mirroring docker-compose.yml's `minio` + `minio_init`.
      - name: Start MinIO (S3-compatible storage)
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/ready; then echo "minio ready"; break; fi
            sleep 1
          done

      - name: Create S3 bucket
        # Create the bucket and grant anonymous read ONLY on the `public/` prefix,
        # so private files stay unreachable by bare URL (spec 21.3) — the exact
        # policy the private-URL acceptance test depends on.
        run: |
          docker run --rm --network host --entrypoint /bin/sh minio/mc:latest -c "
            mc alias set local http://localhost:9000 minioadmin minioadmin &&
            mc mb --ignore-existing local/saas-boilerplate &&
            mc anonymous set download local/saas-boilerplate/public
          "

      # F4.5: the suite drives real tenant hosts (`{sub}.localtest.me`), which is
      # a PUBLIC DNS name resolving to 127.0.0.1. A runner without DNS egress
      # would not fail here — it would hang every tenant navigation until
      # Playwright's timeout, on every affected test, and report a wall of
      # unrelated-looking timeouts. Fail loudly and early instead.
      #
      # Subdomains are minted per test with uniqueId(), so a static /etc/hosts is
      # NOT a usable fallback; the fallback would be Chromium --host-resolver-rules.
      - name: Verify wildcard DNS for tenant hosts
        run: |
          if ! getent hosts probe.localtest.me > /dev/null; then
            echo "::error::*.localtest.me does not resolve on this runner."
            echo "The E2E suite drives tenant hosts by real DNS (see e2e/host-fixtures.ts)."
            exit 1
          fi
          getent hosts probe.localtest.me

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.tenancy }}
          path: playwright-report/
          retention-days: 7
